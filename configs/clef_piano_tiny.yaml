# clef-piano-tiny Training Configuration (Mono-Attn)
# =======================================
#
# Architecture: Octopus + Flow + Swin + BiMamba encoder
#               MambaIsotonicAttnLayer decoder (IOHMM, Bengio & Frasconi 1995)
# Goal: Beat SOTA with principled temporal alignment
#
# This YAML is the single source of truth for ALL hyperparameters.
# Training: python -m src.clef.piano.train --config configs/clef_piano_tiny.yaml [--resume <ckpt>] [--wandb]

# =============================================================================
# Seeds
# =============================================================================
seed:
  training: 1234

# =============================================================================
# Model Architecture
# =============================================================================
model:
  name: "clef-piano-tiny"

  # SwinEncoder (S0 + S1) for acoustic feature extraction
  # Flow [B, T, 128] → SwinEncoder → [B, T/8, 384] @12.5fps
  swin_model: "microsoft/swinv2-tiny-patch4-window8-256"
  swin_dims: []  # Not used (Swin handles internally)
  swin_use_gradient_checkpointing: false
  freeze_swin: true
  swin_start_stage: 0
  swin_pool_strides: []

  # BiMamba Encoder (time-oriented, after Swin → freq_conv)
  # Swin S0+S1 concat (384) → freq_conv → swin_feat [B, T/8, 384] → BiMamba
  # Output h_j [B, T=375, D=384] = decoder memory for monotonic attention
  use_bimamba_encoder: true
  bimamba_input_dim: 384      # Swin S0+S1 concat output dimension
  bimamba_d_model: 384        # Match decoder d_model (Whisper tiny)
  bimamba_d_state: 128
  bimamba_d_conv: 4
  bimamba_num_layers: 2
  bimamba_dropout: 0.1

  # Octopus2D (onset detection)
  use_octopus: true
  octopus_freq_kernel: 31
  octopus_time_kernel: 3
  octopus_channels: 32
  octopus_time_pool_stride: 2
  octopus_freq_pool_stride: 4

  # HarmonizingFlow (pitch space transform)
  use_flow: true
  n_harmonics: 6
  flow_pool_stride: 1  # No pooling, directly to SwinEncoder

  # Attention config (Whisper tiny: d_model=384, n_heads=6, ff_dim=1536)
  d_model: 384
  n_heads: 6
  n_levels: 1                  # Only BiMamba output (level 0)
  ff_dim: 1536                 # 4 × d_model
  dropout: 0.1

  rope_base: 10000.0

  bridge_layers: 1

  # Decoder: MambaIsotonicAttnLayer (IOHMM variant)
  #   Mamba(tgt) → y_i  (token history)
  #   p_{i,j} = σ(λ Q_i·K_j/√d + ℓ_j)  →  α_{i,j} via Raffel recurrence
  #   c [B, N, D] → expand → [B, S, D]  →  W_fuse([y; c]) → pred
  decoder_layer_types: ["isotonic_hmm"]
  decoder_layer_ca_levels:
    - null
  decoder_layer_full_freq:
    - null
  decoder_layer_cascade_com:
    - null

  bar_token_id: 4

  # Onset detector (augmented Lagrangian: μ·gap + ρ·gap²)
  quantity_loss_weight: 0.01   # ρ: quadratic penalty weight (stabilizes dual ascent)
  dual_ascent_lr: 2.0e-4       # step size for dual variable μ update
  onset_conv_kernel: 3         # Temporal context for onset conv head

  # tf_anneal_steps: 0 = disabled (always TF 1.0)
  tf_anneal_steps: 100000

  # Window parameters (kept for compatibility, not used by isotonic_iohmm)
  window_time_frames: [32, 16, 512]
  window_freq_bins: [4, 4, 1]
  window_seq_chunk_size: 10000
  window_exp_decay_lambda: 10.0

  # Mamba config
  mamba_d_state: 128
  mamba_d_conv: 4
  mamba_expand: 2

  max_seq_len: 2048
  vocab_size: 271

  label_smoothing: 0.0

  # Gradient checkpointing
  gradient_checkpointing: false
  window_ca_use_checkpoint: false

  # No guided attention
  guidance_loss_weight: 0.0
  guidance_loss_weight_end: 0.0
  guidance_decay_steps: 0

# =============================================================================
# Data
# =============================================================================
data:
  audio:
    sample_rate: 16000
    n_mels: 128
    n_fft: 2048
    hop_length: 160             # 100 fps
    f_min: 27.5
    f_max: 7040.0

  chunking:
    chunk_frames: 3000          # 30 seconds @ 100 fps
    overlap_frames: 1500        # 15 seconds overlap
    min_chunk_ratio: 0.5
    fallback_chunk_frames: 1500
    fallback_overlap_frames: 750

  augmentation:
    soundfonts:
      - "TimGM6mb.sf2"
      - "FluidR3_GM.sf2"
      - "UprightPianoKW-20220221.sf2"
      - "SalamanderGrandPiano-V3+20200602.sf2"

# =============================================================================
# Training
# =============================================================================
training:
  batch_size: 32
  gradient_accumulation_steps: 1
  gradient_clip: 5.0

  learning_rate: 2.0e-4
  weight_decay: 0.01
  max_epochs: 50
  warmup_steps: 2500
  lr_flat_ratio: 0.25   # WSD: 25% flat plateau, 75% cosine decay
  lr_min_ratio: 0.1

  save_every_n_epochs: 5
  early_stopping_patience: 5
  validate_every_n_steps: 500

# =============================================================================
# Paths
# =============================================================================
paths:
  manifest_dir: "data/experiments/clef_piano_base"
  checkpoint_dir: "checkpoints/clef_piano_tiny"
