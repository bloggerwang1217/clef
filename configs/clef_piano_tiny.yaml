# clef-piano-tiny Training Configuration (Zeng-style)
# =======================================
#
# Minimal PoC: Octopus + Flow + BiMamba + 2-layer decoder
# Goal: Beat SOTA with minimal architecture following Zeng et al. 2024
#
# This YAML is the single source of truth for ALL hyperparameters.
# Training: python -m src.clef.piano.train --config configs/clef_piano_tiny.yaml [--resume <ckpt>] [--wandb]

# =============================================================================
# Seeds
# =============================================================================
seed:
  training: 1234

# =============================================================================
# Model Architecture
# =============================================================================
model:
  name: "clef-piano-tiny"

  # NO Swin in Zeng-style design — BiMamba directly processes Flow output
  swin_model: "microsoft/swinv2-tiny-patch4-window8-256"  # Keep for compatibility
  swin_dims: []  # No Swin stages used
  freeze_swin: true
  swin_start_stage: 0
  swin_pool_strides: []

  # BiMamba Encoder (temporal timing for CIF, 128→128 no projection)
  # Learns onset timing from Flow [B, 3000, 128] @ 100fps
  # Output: fire_signal [B, 3000, 128] for CIF alpha prediction
  bimamba_d_state: 128
  bimamba_d_conv: 4
  bimamba_num_layers: 1
  bimamba_dropout: 0.1

  # Swin S0 Encoder (acoustic content for CIF, independent path)
  # Extracts pitch-selective features from Flow [B, 3000, 128]
  # Output: acoustic_src [B, 375, 192] @ 12.5fps (8x downsample: patch_embed 4x + downsample 2x)
  swin_model: "microsoft/swinv2-tiny-patch4-window8-256"
  swin_unfreeze: []  # Empty list = finetune ALL S0 (pretrained init)
  swin_lr_scale: 0.1  # Learning rate multiplier for S0

  # Octopus2D (onset detection)
  use_octopus: true
  octopus_freq_kernel: 31
  octopus_time_kernel: 3
  octopus_channels: 32
  octopus_time_pool_stride: 2
  octopus_freq_pool_stride: 4

  # HarmonizingFlow (pitch space transform)
  use_flow: true
  n_harmonics: 6
  flow_pool_stride: 1  # No pooling (10ms resolution)

  # Attention config
  d_model: 384
  n_heads: 8
  n_levels: 2                  # Octopus (L0) + Flow (L1); BiMamba/Swin S0 are CIF-internal
  ff_dim: 1536                 # 4 * d_model
  dropout: 0.1

  rope_base: 10000.0

  bridge_layers: 1

  # Decoder: 2 layers (CIF → Mamba)
  #   L0: mamba_cif  — Mamba + CIF acoustic embeddings (no CA, CIF provides embeddings)
  #   L1: mamba_only — sequential writing
  decoder_layer_types: ["mamba_cif", "mamba_only"]
  decoder_layer_ca_levels:
    - null      # L0: CIF provides acoustic_embs (no CA needed)
    - null      # L1: Mamba only
  decoder_layer_full_freq:
    - null
    - null
  decoder_layer_cascade_com:
    - null
    - null

  # bar_token_id: <bar>=4 still needed for bar_mask detection (schema injection)
  bar_token_id: 4
  curriculum_warmup_steps: 0  # Disabled

  # CIF (Continuous Integrate-and-Fire) — replaces BarMamba
  # Decoupled design: fire_signal (BiMamba) + acoustic_src (Swin S0)
  use_cif: true
  cif_threshold: 1.0
  cif_conv_kernel: 1          # No temporal smoothing (BiMamba @ 100fps, Swin @ 25fps)
  cif_scale_factor: 4.0       # Scaled sigmoid: α = 4.0 * sigmoid(x), allows α > 1
  cif_quantity_loss_weight: 0.5    # |Σα - N_acoustic|; was 0.01 (qty_loss=440 * 0.01=4.4, negligible vs CE)
  cif_avg_fires: 128               # avg <sos>+<nl> per 30s chunk (mean≈127, median≈115 from tokenizer stats)

  # tf_anneal_steps: 0 = disabled (always TF 1.0)
  tf_anneal_steps: 100000

  # Window parameters
  # Level 2 = BiMamba (50fps, 30s = 1500 frames).
  # 512 frames ≈ ±5.1s ≈ ±1.7 bars at 80bpm (covers ±2 bars at ≥100bpm).
  # Levels 0,1 values are unused (only level 2 is active).
  window_time_frames: [32, 16, 512]
  window_freq_bins: [4, 4, 1]         # level 2: H=1 (1D BiMamba), must be 1
  window_seq_chunk_size: 10000

  # Exponential decay soft mask: score_j += -lambda * |t_j - com_t| (before softmax).
  # λ=10: 1 bar (150 frames, 0.1 unit) → bias=-1.0 (soft). Range: 10–50.
  window_exp_decay_lambda: 10.0

  # Mamba config
  mamba_d_state: 128
  mamba_d_conv: 4
  mamba_expand: 2

  max_seq_len: 2048
  vocab_size: 271

  label_smoothing: 0.0

  # Gradient checkpointing
  gradient_checkpointing: true
  window_ca_use_checkpoint: false

  # No guided attention
  guidance_loss_weight: 0.0
  guidance_loss_weight_end: 0.0
  guidance_decay_steps: 0

# =============================================================================
# Data
# =============================================================================
data:
  audio:
    sample_rate: 16000
    n_mels: 128
    n_fft: 2048
    hop_length: 160             # 100 fps
    f_min: 27.5
    f_max: 7040.0

  chunking:
    chunk_frames: 3000          # 30 seconds @ 100 fps
    overlap_frames: 1500        # 15 seconds overlap
    min_chunk_ratio: 0.5
    fallback_chunk_frames: 1500
    fallback_overlap_frames: 750

  augmentation:
    soundfonts:
      - "TimGM6mb.sf2"
      - "FluidR3_GM.sf2"
      - "UprightPianoKW-20220221.sf2"
      - "SalamanderGrandPiano-V3+20200602.sf2"

# =============================================================================
# Training
# =============================================================================
training:
  batch_size: 32
  gradient_accumulation_steps: 1
  gradient_clip: 1.0

  learning_rate: 2.0e-4
  weight_decay: 0.05
  max_epochs: 50
  warmup_steps: 2500
  lr_flat_ratio: 0.25  # WSD: 25% of post-warmup = flat plateau, 75% = cosine decay
  lr_min_ratio: 0.1

  save_every_n_epochs: 5
  early_stopping_patience: 5
  validate_every_n_steps: 500

# =============================================================================
# Paths
# =============================================================================
paths:
  manifest_dir: "data/experiments/clef_piano_base"
  checkpoint_dir: "checkpoints/clef_piano_tiny"
