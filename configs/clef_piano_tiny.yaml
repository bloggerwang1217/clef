# clef-piano-tiny Training Configuration (Zeng-style)
# =======================================
#
# Minimal PoC: Octopus + Flow + BiMamba + 2-layer decoder
# Goal: Beat SOTA with minimal architecture following Zeng et al. 2024
#
# This YAML is the single source of truth for ALL hyperparameters.
# Training: python -m src.clef.piano.train --config configs/clef_piano_tiny.yaml [--resume <ckpt>] [--wandb]

# =============================================================================
# Seeds
# =============================================================================
seed:
  training: 1234

# =============================================================================
# Model Architecture
# =============================================================================
model:
  name: "clef-piano-tiny"

  # SwinEncoder (S0 + S1) for acoustic feature extraction
  # Flow [B, T, 128] → SwinEncoder → [B, T/8, 384] @12.5fps
  swin_model: "microsoft/swinv2-tiny-patch4-window8-256"
  swin_dims: []  # Not used (Swin handles internally)
  swin_use_gradient_checkpointing: false
  freeze_encoder: true
  swin_start_stage: 0
  swin_pool_strides: []

  # BiMamba Encoder (time-oriented, after Swin)
  use_bimamba_encoder: true
  bimamba_input_dim: 384      # Swin S0+S1 concat output dimension
  bimamba_d_model: 384        # Match decoder d_model (Whisper tiny)
  bimamba_d_state: 128
  bimamba_d_conv: 4
  bimamba_num_layers: 2
  bimamba_dropout: 0.1

  # Octopus2D (onset detection)
  use_octopus: true
  octopus_freq_kernel: 31
  octopus_time_kernel: 3
  octopus_channels: 32
  octopus_time_pool_stride: 2
  octopus_freq_pool_stride: 4

  # HarmonizingFlow (pitch space transform)
  use_flow: true
  n_harmonics: 6
  flow_pool_stride: 1  # No pooling, directly to SwinEncoder

  # Attention config (Whisper tiny: d_model=384, n_heads=6, ff_dim=1536)
  d_model: 384
  n_heads: 6
  n_levels: 1                  # Only BiMamba output (level 0)
  ff_dim: 1536                 # 4 × d_model
  dropout: 0.1

  rope_base: 10000.0

  # Decoder: 1 layer (SA + CA to BiMamba)
  #   L0: mamba_full_ca — Mamba + CA, outputs cat([mamba_out, ca_out]) = 2D
  decoder_layer_types: ["mamba_full_ca"]
  decoder_layer_ca_levels:
    - [0]       # L0: Full CA to BiMamba (level 0)
  decoder_layer_full_freq:
    - true      # L0: BiMamba level is H=1 (1D), full_freq is the only option
  decoder_layer_cascade_com:
    - false

  # BarMamba: bar-level module for mamba_full_ca path
  bar_token_id: 4       # <bar> token ID in KernTokenizer vocab
  curriculum_warmup_steps: 0  # Disabled

  # tf_anneal_steps: 0 = disabled (always TF 1.0)
  tf_anneal_steps: 100000

  # GRU sequential mode: replace Mamba.step() with GRUCell for hypothesis validation.
  # Validates: does audio-conditioned query h_{t-1} push pitch loss below 2?
  use_gru_sequential: true
  tbptt_chunk_size: 256  # detach hidden state every 256 steps

  # Window parameters
  # Level 2 = BiMamba (50fps, 30s = 1500 frames).
  # 512 frames ≈ ±5.1s ≈ ±1.7 bars at 80bpm (covers ±2 bars at ≥100bpm).
  # Levels 0,1 values are unused (only level 2 is active).
  window_time_frames: [32, 16, 512]
  window_freq_bins: [4, 4, 1]         # level 2: H=1 (1D BiMamba), must be 1
  window_seq_chunk_size: 10000

  # Exponential decay soft mask: score_j += -lambda * |t_j - com_t| (before softmax).
  # λ=10: 1 bar (150 frames, 0.1 unit) → bias=-1.0 (soft). Range: 10–50.
  window_exp_decay_lambda: 10.0

  # Mamba config
  mamba_d_state: 128
  mamba_d_conv: 4
  mamba_expand: 2

  max_seq_len: 2048
  vocab_size: 271

  label_smoothing: 0.0

  # Gradient checkpointing
  gradient_checkpointing: false
  window_ca_use_checkpoint: false

  # No guided attention
  guidance_loss_weight: 0.0
  guidance_loss_weight_end: 0.0
  guidance_decay_steps: 0

# =============================================================================
# Data
# =============================================================================
data:
  audio:
    sample_rate: 16000
    n_mels: 128
    n_fft: 2048
    hop_length: 160             # 100 fps
    f_min: 27.5
    f_max: 7040.0

  chunking:
    chunk_frames: 3000          # 30 seconds @ 100 fps
    overlap_frames: 1500        # 15 seconds overlap
    min_chunk_ratio: 0.5
    fallback_chunk_frames: 1500
    fallback_overlap_frames: 750

  augmentation:
    soundfonts:
      - "TimGM6mb.sf2"
      - "FluidR3_GM.sf2"
      - "UprightPianoKW-20220221.sf2"
      - "SalamanderGrandPiano-V3+20200602.sf2"

# =============================================================================
# Training
# =============================================================================
training:
  batch_size: 32
  gradient_accumulation_steps: 1
  gradient_clip: 1.0

  learning_rate: 2.0e-4
  weight_decay: 0.01
  max_epochs: 50
  warmup_steps: 1000
  lr_flat_ratio: 0.6   # WSD: 60% of post-warmup = flat plateau, 40% = cosine decay
  lr_min_ratio: 0.1

  save_every_n_epochs: 5
  early_stopping_patience: 0
  validate_every_n_steps: 500

# =============================================================================
# Paths
# =============================================================================
paths:
  manifest_dir: "data/experiments/clef_piano_base"  # Use base data for testing
  checkpoint_dir: "checkpoints/clef_piano_tiny"
